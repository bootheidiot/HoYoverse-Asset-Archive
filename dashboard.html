<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Dashboard — HoYoverse Asset Archive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1a0f2e;
      --surface:      rgba(255,255,255,0.07);
      --text:         #ffffff;
      --muted:        rgba(255,255,255,0.6);
      --accent:       #9966CC;
      --accent-light: #5c3d7a;
      --border:       rgba(255,255,255,0.15);
      --gold:         #9966CC;
      --nav-bg:       rgba(20,10,40,0.85);
      --footer-bg:    rgba(15,8,30,0.9);
      --error:        #ff6b6b;
      --success:      #6bffb8;
      --error-bg:     rgba(255,107,107,0.1);
      --success-bg:   rgba(107,255,184,0.1);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Calibri', sans-serif;
      font-weight: 400;
      transition: background 1.2s ease;
    }

    /* ── NAV ── */
    nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .nav-brand { font-family: 'Calibri', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); }

    .nav-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
    }

    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }

    .pending-count { font-size: 0.85rem; color: var(--muted); }
    .pending-count strong { color: var(--accent); font-weight: 700; }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 { font-family: 'Calibri', sans-serif; font-size: 2rem; font-weight: 700; text-shadow: 0 2px 16px rgba(0,0,0,0.5); }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .filter-btn {
      padding: 0.4rem 0.9rem;
      border-radius: 3px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: 'Calibri', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── CONFIG BANNER ── */
    .config-banner {
      background: rgba(255,200,100,0.1);
      border: 1px solid rgba(255,200,100,0.3);
      border-radius: 4px;
      padding: 0.85rem 1.2rem;
      font-size: 0.82rem;
      color: rgba(255,220,120,0.9);
      margin-bottom: 2rem;
      line-height: 1.6;
      backdrop-filter: blur(8px);
    }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--muted); }
    .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5; }

    /* ── CARD ── */
    .submissions { display: flex; flex-direction: column; gap: 1.5rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .card-id { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .tag {
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .tag-game             { background: rgba(153,102,204,0.25); color: #cc99ff; }
    .tag-type             { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.7); }
    .tag-status-pending   { background: rgba(255,200,80,0.15);  color: #ffd060; }
    .tag-status-approved  { background: rgba(107,255,184,0.15); color: #6bffb8; }
    .tag-status-rejected  { background: rgba(255,107,107,0.15); color: #ff6b6b; }

    .card-time { margin-left: auto; font-size: 0.75rem; color: var(--muted); }

    /* ── FILE GRID ── */
    .file-grid {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .file-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: rgba(0,0,0,0.2);
    }

    .file-preview {
      width: 100%;
      aspect-ratio: 16/10;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .file-preview img, .file-preview video {
      width: 100%; height: 100%; object-fit: contain;
    }

    .file-preview .file-icon { font-size: 2rem; opacity: 0.4; }

    .file-info {
      padding: 0.6rem 0.75rem;
      border-top: 1px solid var(--border);
    }

    .file-fname {
      font-size: 0.78rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }

    .file-meta { display: flex; gap: 0.75rem; font-size: 0.7rem; color: var(--muted); }

    .file-download {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .file-download:hover { text-decoration: underline; }

    /* ── ACTIONS ── */
    .card-actions {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(0,0,0,0.15);
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 4px;
      font-family: 'Calibri', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }

    .btn-approve {
      background: rgba(107,255,184,0.15);
      color: var(--success);
      border-color: rgba(107,255,184,0.3);
    }
    .btn-approve:hover { background: rgba(107,255,184,0.25); }

    .btn-reject {
      background: rgba(255,107,107,0.1);
      color: var(--error);
      border-color: rgba(255,107,107,0.25);
    }
    .btn-reject:hover { background: rgba(255,107,107,0.2); }

    .btn-delete {
      background: rgba(255,150,50,0.1);
      color: #ffaa55;
      border-color: rgba(255,150,50,0.25);
    }
    .btn-delete:hover { background: rgba(255,150,50,0.2); }

    .action-note { margin-left: auto; font-size: 0.75rem; color: var(--muted); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(30,15,50,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.25rem;
      border-radius: 4px;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 999;
      backdrop-filter: blur(12px);
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    footer {
      background: var(--footer-bg);
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      font-family: 'Calibri', sans-serif;
      color: var(--muted);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 1;
    }
    footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">HoYoverse Asset Archive</span>
    <span class="nav-badge">Admin Dashboard</span>
    <div class="nav-right">
      <span class="pending-count"><strong id="pending-num">—</strong> pending</span>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div>
        <p class="eyebrow">Review Queue</p>
        <h1>Submissions</h1>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
        <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
        <button class="filter-btn" onclick="setFilter('all', this)">All</button>
      </div>
    </div>

    <div class="config-banner">
      <strong>Setup note:</strong> Replace <code>BACKEND_URL</code> in this file with your deployed backend URL if you haven't already.
    </div>

    <div class="submissions" id="submissions-container">
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <strong>Loading submissions…</strong>
        <p>Connecting to backend.</p>
      </div>
    </div>
  </main>

  <footer>
    HoYoverse Asset Archive &mdash;
    <a href="https://archive.org/details/@bootheidiot/uploads" target="_blank">View on Internet Archive</a>
  </footer>

  <div id="toast"></div>

  <script src="wallpaper.js"></script>
  <script>
    const BACKEND_URL = 'https://hoyoverse-asset-archive-backend.onrender.com';

    let currentFilter = 'pending';
    let allSubmissions = [];

    const GAME_LABELS = {
      'zzz': 'Zenless Zone Zero',
    };

    const TYPE_LABELS = {
      'limited-time-events': 'Limited Time Events',
      'misc-marketing-material': 'Misc Marketing Material',
    };

    function humanTime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function isImage(name) { return /\.(png|jpe?g|gif|webp|svg|avif)$/i.test(name); }
    function isVideo(name) { return /\.(mp4|webm|mov|avi|mkv)$/i.test(name); }

    function renderPreview(file) {
      if (isImage(file.name) && file.url) return `<img src="${file.url}" alt="${file.name}" loading="lazy">`;
      if (isVideo(file.name) && file.url) return `<video src="${file.url}" controls preload="metadata"></video>`;
      const ext = file.name.split('.').pop().toUpperCase();
      return `<span class="file-icon">📄 ${ext}</span>`;
    }

    function renderCard(sub) {
      const gameLabel = GAME_LABELS[sub.game] || sub.game;
      const typeLabel = TYPE_LABELS[sub.contentType] || sub.contentType;

      const filesHtml = (sub.files || []).map(f => `
        <div class="file-card">
          <div class="file-preview">${renderPreview(f)}</div>
          <div class="file-info">
            <div class="file-fname" title="${f.name}">${f.name}</div>
            <div class="file-meta">
              <span>${formatSize(f.size)}</span>
              ${f.resolution ? `<span>${f.resolution}</span>` : ''}
            </div>
            ${f.url ? `<a class="file-download" href="${f.url}" download="${f.name}">⬇ Download</a>` : ''}
          </div>
        </div>
      `).join('');

      // Actions depending on status
      let actionsHtml = '';
      if (sub.status === 'pending') {
        actionsHtml = `
          <button class="btn btn-approve" onclick="review('${sub.id}', 'approved')">✓ Approve</button>
          <button class="btn btn-reject"  onclick="review('${sub.id}', 'rejected')">✕ Reject</button>
          <span class="action-note">${(sub.files || []).length} file(s)</span>
        `;
      } else if (sub.status === 'approved') {
        const r2Deleted = sub.r2Deleted;
        actionsHtml = `
          <span style="color: var(--success); font-size:0.82rem;">✓ Approved — ${humanTime(sub.reviewedAt)}</span>
          ${!r2Deleted
            ? `<button class="btn btn-delete" onclick="deleteFromR2('${sub.id}')">🗑 Delete from Cloudflare</button>`
            : `<span style="color:var(--muted);font-size:0.78rem;">✓ Removed from Cloudflare</span>`
          }
          <span class="action-note">${(sub.files || []).length} file(s)</span>
        `;
      } else {
        actionsHtml = `
          <span style="color: var(--error); font-size:0.82rem;">✕ Rejected — ${humanTime(sub.reviewedAt)}</span>
          ${!sub.r2Deleted
            ? `<button class="btn btn-delete" onclick="deleteFromR2('${sub.id}')">🗑 Delete from Cloudflare</button>`
            : `<span style="color:var(--muted);font-size:0.78rem;">✓ Removed from Cloudflare</span>`
          }
          <span class="action-note">${(sub.files || []).length} file(s)</span>
        `;
      }

      return `
        <div class="card" id="card-${sub.id}">
          <div class="card-header">
            <span class="card-id">#${sub.id}</span>
            <div class="card-tags">
              <span class="tag tag-game">${gameLabel}</span>
              <span class="tag tag-type">${typeLabel}</span>
              <span class="tag tag-status-${sub.status}">${sub.status}</span>
            </div>
            <span class="card-time">${humanTime(sub.submittedAt)}</span>
          </div>
          <div class="file-grid">${filesHtml || '<p style="padding:1rem;color:var(--muted);font-size:0.85rem;">No files attached.</p>'}</div>
          <div class="card-actions">${actionsHtml}</div>
        </div>
      `;
    }

    function render() {
      const filtered = currentFilter === 'all'
        ? allSubmissions
        : allSubmissions.filter(s => s.status === currentFilter);

      document.getElementById('pending-num').textContent = allSubmissions.filter(s => s.status === 'pending').length;

      const container = document.getElementById('submissions-container');
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <strong>No ${currentFilter === 'all' ? '' : currentFilter + ' '}submissions</strong>
            <p>${currentFilter === 'pending' ? 'All caught up!' : 'Nothing here yet.'}</p>
          </div>`;
        return;
      }
      container.innerHTML = filtered.map(renderCard).join('');
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    async function review(id, action) {
      const btnClass = action === 'approved' ? 'btn-approve' : 'btn-reject';
      const btn = document.querySelector(`#card-${id} .${btnClass}`);
      if (btn) { btn.disabled = true; btn.textContent = '…'; }

      try {
        const res = await fetch(`${BACKEND_URL}/review/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action })
        });
        if (!res.ok) throw new Error();
        const sub = allSubmissions.find(s => s.id === id);
        if (sub) sub.status = action;
        render();
        showToast(action === 'approved' ? '✓ Approved and uploading to Archive.org…' : '✕ Submission rejected.');
      } catch {
        showToast('Something went wrong. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = action === 'approved' ? '✓ Approve' : '✕ Reject'; }
      }
    }

    async function deleteFromR2(id) {
      const btn = document.querySelector(`#card-${id} .btn-delete`);
      if (btn) { btn.disabled = true; btn.textContent = 'Deleting…'; }

      try {
        const res = await fetch(`${BACKEND_URL}/delete-r2/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error();
        const sub = allSubmissions.find(s => s.id === id);
        if (sub) sub.r2Deleted = true;
        render();
        showToast('🗑 Files deleted from Cloudflare R2.');
      } catch {
        showToast('Delete failed. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = '🗑 Delete from Cloudflare'; }
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    async function loadSubmissions() {
      try {
        const res = await fetch(`${BACKEND_URL}/submissions`);
        if (!res.ok) throw new Error();
        allSubmissions = await res.json();
        render();
      } catch {
        document.getElementById('submissions-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <strong>Could not connect to backend</strong>
            <p>Make sure your backend is running and BACKEND_URL is correct.</p>
          </div>`;
      }
    }

    loadSubmissions();
    setInterval(loadSubmissions, 60000);
  </script>
</body>
</html>
